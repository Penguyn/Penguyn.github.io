<head>
  <meta charset="UTF-8" />

  <title>cupy • ქაფი</title>
  <style>
    @font-face {
      font-family: 'NewHero';
      src: url('Font_New_Hero/fonnts.com-New_Hero_Super.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'NewHero';
      src: url('Font_New_Hero/fonnts.com-New_Hero_Super_Italic.otf') format('opentype');
      font-weight: 400;
      font-style: italic;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'NewHero', sans-serif;
      padding: 2rem 1.25rem;
      position: relative;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      background-image: url('cupywall.svg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* ONE BIG FRAME wrapping everything */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: rgba(0,0,0,0.32);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: clamp(1.5rem, 5vw, 2.25rem) clamp(1.25rem, 5vw, 2rem);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .logo-wrap svg {
      width: clamp(80px, 28vw, 120px);
      height: clamp(80px, 28vw, 120px);
    }
    .logo-wrap svg path {
      fill: #ff7900;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: clamp(1rem, 4vw, 1.5rem) auto;
    }

    .section-label {
      font-family: 'NewHero', sans-serif;
      font-style: normal;
      font-size: clamp(10px, 2.5vw, 11px);
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: clamp(0.65rem, 2.5vw, 0.9rem);
    }

    /* STARS */
    .stars {
      display: flex;
      gap: 5px;
      margin-bottom: 12px;
    }

    .star {
      width: clamp(18px, 5vw, 22px);
      height: clamp(18px, 5vw, 22px);
    }

    /* BUTTON */
    .rating-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: clamp(9px, 2.5vw, 12px) clamp(16px, 5vw, 24px);
      background: #ff7900;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      font-family: 'NewHero', sans-serif;
      font-style: italic;
      font-size: clamp(11px, 3vw, 13px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }
    .rating-cta:hover { opacity: 0.85; }
    .rating-cta svg {
      width: 14px; height: 14px;
      flex-shrink: 0;
    }

    /* SOCIALS */
    .socials {
      display: flex;
      gap: clamp(20px, 6vw, 32px);
      justify-content: center;
    }

    .social-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .social-icon:hover {
      opacity: 0.8;
      transform: scale(1.1);
    }
    .social-icon svg {
      width: 40px;
      height: 40px;
    }

    @media (min-width: 600px) {
      .card { max-width: 400px; }
    }
    @media (min-width: 1024px) {
      .card { max-width: 420px; }
    }
  </style>
</head>
